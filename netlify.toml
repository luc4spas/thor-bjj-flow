# Este projeto roda em TanStack Start com SSR (Cloudflare Workers via Lovable).
# Netlify atua apenas como proxy/CDN para o app publicado pela Lovable,
# preservando 100% das funcionalidades (SSR, server functions, auth, Supabase).
#
# IMPORTANTE: Substitua a URL abaixo pela URL publicada do seu projeto.
# Ex.: https://thor-bjj-flow.lovable.app  ou  https://project--<id>.lovable.app

[build]
  publish = "public"
  command = "echo 'No build needed - proxying to Lovable deployment'"

# Proxy de TODO o tráfego (HTML, assets, APIs, server functions) para a Lovable.
# status = 200 mantém a URL do usuário no domínio Netlify.
[[redirects]]
  from = "/*"
  to = "https://thor-bjj-flow.lovable.app/:splat"
  status = 200
  force = true
